version: '3.8'

services:
  db:
    image: mysql:5.7
    container_name: prestashop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prestashop
    ports:
      - "3307:3306"
    command: --sql_mode=""

  prestashop:
    image: prestashop/prestashop:1.7.8.11
    container_name: prestashop_app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      DB_SERVER: db
      DB_NAME: prestashop
      DB_USER: root
      DB_PASSWD: root
      PS_INSTALL_AUTO: 1
      PS_DOMAIN: localhost:8080
      PS_FOLDER_ADMIN: admin123
      PS_FOLDER_INSTALL: install123
      PS_DEV_MODE: 1
      PS_ENABLE_SSL: 0
    volumes:
      - ./modules/productbadges:/var/www/html/modules/productbadges
